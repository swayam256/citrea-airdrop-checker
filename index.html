<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citrea Reward Checker</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top right,#6b2d00,#1a120b 28%,#090909 70%,#000);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.wrap{max-width:560px;width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,153,0,.18);border-radius:26px;padding:28px;box-shadow:0 0 40px rgba(255,140,0,.18)}.brand{display:flex;align-items:center;gap:12px;font-size:38px;font-weight:800;margin-bottom:18px}.logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#fff,#cfcfcf);display:grid;place-items:center;color:#111;font-weight:900}.sub{opacity:.78;margin-bottom:16px}.input,select,button{width:100%;padding:15px;border-radius:14px;border:none;font-size:16px}.input,select{background:#fff;color:#111;margin-top:12px}button{margin-top:14px;background:linear-gradient(90deg,#ff6a00,#ffb347);color:#111;font-weight:800;cursor:pointer}.scan{display:none;height:8px;background:rgba(255,255,255,.08);border-radius:20px;margin-top:18px;overflow:hidden}.bar{height:100%;width:30%;background:linear-gradient(90deg,#fff,#ff9900);animation:scan 1s linear infinite}@keyframes scan{from{transform:translateX(-130%)}to{transform:translateX(420%)}}.result{display:none;margin-top:18px;background:rgba(255,255,255,.04);padding:18px;border-radius:18px;line-height:1.9}.foot{font-size:12px;opacity:.62;text-align:center;margin-top:14px}
</style>
</head>
<body>
<div class='wrap'>
<div class='brand'><div class='logo'>⬢</div><div>Citrea</div></div>
<div class='sub'>Check wallet activity across Testnet • Mainnet • Discord</div>
<input id='wallet' class='input' placeholder='Enter wallet address'>
<select id='role'><option>None</option><option>CC</option><option>OG</option><option>Citreans</option><option>Bappers</option></select>
<button onclick='runScan()'>ELIGIBILITY CHECK</button>
<div class='scan' id='scan'><div class='bar'></div></div>
<div class='result' id='result'></div>
<div class='foot'>Unofficial community checker • Estimated values only</div>
</div>
<script>
async function getJson(u){const r=await fetch(u);if(!r.ok)throw new Error();return await r.json();}
async function runScan(){const w=document.getElementById('wallet').value.trim();const role=document.getElementById('role').value;const s=document.getElementById('scan');const r=document.getElementById('result');if(!w){r.style.display='block';r.innerHTML='⚠️ Enter wallet first';return;}s.style.display='block';r.style.display='none';try{const main=await getJson('https://api.citreascan.com/api/v2/addresses/'+w);let testTx=0;try{const test=await getJson('https://api.testnet.citreascan.com/api/v2/addresses/'+w);testTx=parseInt(test.transactions_count||0);}catch(e){}const mainTx=parseInt(main.transactions_count||0);const bal=parseFloat(main.coin_balance||0);const contracts=Math.max(1,Math.floor(mainTx/4));let bonus=0;if(role==='CC')bonus=160;else if(role==='OG')bonus=110;else if(role==='Citreans')bonus=70;else if(role==='Bappers')bonus=40;const score=mainTx+testTx+(contracts*6)+Math.floor(bal*10)+bonus;const alloc=(1200+score*19).toLocaleString();s.style.display='none';r.style.display='block';r.innerHTML='🧪 Testnet Score: '+testTx+'<br>🌐 Mainnet Score: '+mainTx+'<br>⚙️ Contracts Used: '+contracts+'<br>🎭 Discord Role: '+role+(role==='CC'?' 👑':'')+'<br><br>🎁 Expected Allocation: '+alloc+' $CTR';}catch(e){s.style.display='none';r.style.display='block';r.innerHTML='❌ Unable to fetch wallet data right now.';}}
</script>
</body>
</html>
